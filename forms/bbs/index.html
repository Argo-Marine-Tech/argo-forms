<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>BBS Observation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">

        <a class="navbar-brand" href="../../index.html">
            ← ARGO Marine Digital Forms Portal
        </a>

    </div>
</nav>

<div class="container my-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">
                Behaviour Based Safety (BBS) Observation
            </h3>

        </div>

        <div class="card-body">

            <p class="text-muted">
                Please complete all applicable fields.
            </p>

            <form>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Observation Date</label>

                        <input type="date" class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Observation Time</label>

                        <input type="time" class="form-control">

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Observer Name
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Enter your name">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Work Location

                    </label>

                    <input
                        type="text"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Observation Description

                    </label>

                    <textarea
                        class="form-control"
                        rows="6"></textarea>

                </div>

                <button
                    class="btn btn-warning btn-lg">

                    Submit Observation

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
